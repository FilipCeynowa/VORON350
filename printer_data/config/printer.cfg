#####################################################################
#   Extruder - KALICO MPC
#####################################################################
##  In ERCF Position

[extruder]
step_pin: ercf:gpio10
dir_pin: ercf:gpio9
enable_pin: !ercf:gpio8
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
rotation_distance: 35.8 (Tune it with a 200mm extrusion test)
gear_ratio: 60:10 #(For 10th motor gear)
#gear_ratio: 60:8 (For 8th motor gear)

### BONDTECH EXTRUDER ###
  #rotation_distance: 3.99
###
microsteps: 16
nozzle_diameter: 0.500
filament_diameter: 1.750
heater_pin: PF5
pressure_advance_smooth_time: 0.03
#control:mpc
heater_power:120
#   Nameplate heater power in watts. 
#   Note that for a PTC, a non-linear heater, MPC may not work optimally due
#   to the change in power output relative to temperature for this style of
#   heater. Setting heater_power to the power output at the expected printing
#   temperature is recommended.
cooling_fan:fan
filament_density: 1.2
filament_heat_capacity: 1.8
min_temp: -10
max_temp: 500
min_extrude_temp: 150
max_power: 0.95

sensor_type: MAX31865 
sensor_pin: PC9
spi_speed: 3500000
spi_software_sclk_pin: PC10
spi_software_mosi_pin: PC12
spi_software_miso_pin: PC11
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
rtd_use_50Hz_filter: True

#sensor_type: PT1000
#sensor_pin: PC4
#pullup_resistor: 2200

max_extrude_only_distance: 1400.0
max_extrude_only_velocity: 75.0
max_extrude_only_accel: 1500
pressure_advance_smooth_time:0.01
max_extrude_cross_section: 10

